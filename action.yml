name: 'Ghost Review'
description: 'Zero-Cost, Privacy-First AI Code Review & Auto-PR via GitHub Actions'
author: 'Gaurav Chauhan'
branding:
  icon: 'eye'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}
  model-size:
    description: 'Model size to use (auto, 7b, or 3b)'
    required: false
    default: 'auto'

outputs:
  risk-level:
    description: 'Risk level determined by the review (low, medium, high, critical)'
  recommendation:
    description: 'Merge recommendation (approve, request_changes, needs_discussion)'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install build dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq build-essential cmake git

    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ghost-review-pip-${{ hashFiles('.github/scripts/requirements.txt') }}
        restore-keys: ghost-review-pip-

    - name: Install Python dependencies
      shell: bash
      run: |
        pip install -q -r ${{ github.action_path }}/.github/scripts/requirements.txt \
          --break-system-packages

    - name: Detect runner configuration
      id: detect
      shell: bash
      env:
        MODEL_SIZE_OVERRIDE: ${{ inputs.model-size }}
      run: |
        source ${{ github.action_path }}/.github/scripts/lib/detect.sh
        detect_runner_config
        echo "model_size=${MODEL_SIZE}" >> "$GITHUB_OUTPUT"

    - name: Cache llama.cpp binary
      uses: actions/cache@v4
      id: llama-cache
      with:
        path: ~/.cache/ghost-review/llama-bin
        key: ghost-review-llama-b8252-ubuntu-arm64-v2

    - name: Build llama.cpp
      shell: bash
      if: steps.llama-cache.outputs.cache-hit != 'true'
      run: |
        source ${{ github.action_path }}/.github/scripts/lib/build.sh
        build_llama_cpp_if_needed

    - name: Cache LLM model
      uses: actions/cache@v4
      id: model-cache
      with:
        path: ~/.cache/ghost-review/models
        key: ghost-review-model-${{ steps.detect.outputs.model_size }}-q4km-v1

    - name: Download model
      shell: bash
      if: steps.model-cache.outputs.cache-hit != 'true'
      run: |
        source ${{ github.action_path }}/.github/scripts/lib/download.sh
        download_models_if_needed

    - name: Start inference server
      shell: bash
      run: |
        source ${{ github.action_path }}/.github/scripts/lib/server.sh
        source ${{ github.action_path }}/.github/scripts/lib/detect.sh
        detect_runner_config
        
        echo "::group::Start llama-server"
        if [[ "$RUNNER_VCPUS" -ge 4 ]] && [[ "$MODEL_SIZE" == "7b" ]]; then
            start_server_4vcpu_7b
        elif [[ "$RUNNER_VCPUS" -lt 4 ]] && [[ "$MODEL_SIZE" == "3b" ]]; then
            start_server_2vcpu_3b
        elif [[ "$RUNNER_VCPUS" -lt 4 ]] && [[ "$MODEL_SIZE" == "7b" ]]; then
            start_server_2vcpu_7b
        else
            start_server_2vcpu_3b
        fi
        echo "::endgroup::"
        
        {
            echo "LLAMA_SERVER_URL=http://127.0.0.1:8080"
            echo "GHOST_REVIEW_MODEL=qwen2.5-coder-${MODEL_SIZE}-instruct-q4_k_m"
        } >> "$GITHUB_ENV"

    - name: Run PR review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: python ${{ github.action_path }}/.github/scripts/review.py

    - name: Stop inference server
      shell: bash
      if: always()
      run: |
        source ${{ github.action_path }}/.github/scripts/lib/server.sh
        stop_server
