name: 'Ghost Review'
description: 'Zero-Cost, Privacy-First AI Code Review & Auto-PR via GitHub Actions'
author: 'Gaurav Chauhan'
branding:
  icon: 'eye'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}
  model-size:
    description: 'Model size to use (auto, 7b, or 3b)'
    required: false
    default: 'auto'

outputs:
  risk-level:
    description: 'Risk level determined by the review (low, medium, high, critical)'
  recommendation:
    description: 'Merge recommendation (approve, request_changes, needs_discussion)'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ghost-review-pip-${{ hashFiles('.github/scripts/requirements.txt') }}
        restore-keys: ghost-review-pip-

    - name: Install Python dependencies
      shell: bash
      run: |
        pip install -q -r ${{ github.action_path }}/.github/scripts/requirements.txt \
          --break-system-packages

    - name: Detect runner configuration
      id: detect
      shell: bash
      env:
        MODEL_SIZE_OVERRIDE: ${{ inputs.model-size }}
      run: |
        source ${{ github.action_path }}/.github/scripts/lib/detect.sh
        detect_runner_config
        echo "model_size=${MODEL_SIZE}" >> "$GITHUB_OUTPUT"

    - name: Cache LLM model
      uses: actions/cache@v4
      with:
        path: ~/.cache/ghost-review/models
        key: ghost-review-model-${{ steps.detect.outputs.model_size }}-q4km-v1

    - name: Setup inference engine
      shell: bash
      env:
        MODEL_SIZE_OVERRIDE: ${{ inputs.model-size }}
      run: bash ${{ github.action_path }}/.github/scripts/setup_inference.sh

    - name: Run PR review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: python ${{ github.action_path }}/.github/scripts/review.py

    - name: Stop inference server
      shell: bash
      if: always()
      run: |
        source ${{ github.action_path }}/.github/scripts/lib/server.sh
        stop_server
