name: Ghost Review — Auto-Fix

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

jobs:
  auto-fix:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/fix') &&
        github.event.issue.pull_request == null
      ) ||
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'auto-fix'
      )

    runs-on: ubuntu-24.04-arm

    permissions:
      issues:        write
      contents:      write
      pull-requests: write

    timeout-minutes: 35

    env:
      MODEL_SIZE_OVERRIDE: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify actor permission
        id: perms
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            let permission;
            try {
              const { data: p } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                username: actor,
              });
              permission = p.permission;
            } catch (e) {
              console.log(`Permission check failed for ${actor}: ${e}`);
              core.setOutput('allowed', 'false');
              return;
            }
            const allowed = ['admin', 'maintain', 'write'].includes(permission);
            console.log(`Actor: ${actor} | Permission: ${permission} | Allowed: ${allowed}`);
            core.setOutput('allowed', String(allowed));

      - name: Configure git identity
        if: steps.perms.outputs.allowed == 'true'
        run: |
          git config user.name  "GhostReview[bot]"
          git config user.email "ghost-review-bot@users.noreply.github.com"

      - name: Install build dependencies
        if: steps.perms.outputs.allowed == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake git

      - name: Cache Python packages
        if: steps.perms.outputs.allowed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ghost-review-pip-${{ hashFiles('.github/scripts/requirements.txt') }}
          restore-keys: ghost-review-pip-

      - name: Install Python dependencies
        if: steps.perms.outputs.allowed == 'true'
        run: |
          pip install -q -r .github/scripts/requirements.txt \
            --break-system-packages

      - name: Detect runner configuration
        if: steps.perms.outputs.allowed == 'true'
        id: detect
        run: |
          source .github/scripts/lib/detect.sh
          detect_runner_config
          echo "model_size=${MODEL_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Cache llama.cpp binary
        if: steps.perms.outputs.allowed == 'true'
        uses: actions/cache@v4
        id: llama-cache
        with:
          path: ~/.cache/ghost-review/llama-bin
          key: ghost-review-llama-b8252-static-ubuntu-arm64-v3

      - name: Build llama.cpp
        if: steps.perms.outputs.allowed == 'true' && steps.llama-cache.outputs.cache-hit != 'true'
        run: |
          source .github/scripts/lib/build.sh
          build_llama_cpp_if_needed

      - name: Cache LLM model
        if: steps.perms.outputs.allowed == 'true'
        uses: actions/cache@v4
        id: model-cache
        with:
          path: ~/.cache/ghost-review/models
          key: ghost-review-model-${{ steps.detect.outputs.model_size }}-q4km-v1

      - name: Download model
        if: steps.perms.outputs.allowed == 'true' && steps.model-cache.outputs.cache-hit != 'true'
        run: |
          source .github/scripts/lib/download.sh
          download_models_if_needed

      - name: Start inference server
        if: steps.perms.outputs.allowed == 'true'
        run: |
          source .github/scripts/lib/server.sh
          source .github/scripts/lib/detect.sh
          detect_runner_config
          
          echo "::group::Start llama-server"
          if [[ "$RUNNER_VCPUS" -ge 4 ]] && [[ "$MODEL_SIZE" == "7b" ]]; then
              start_server_4vcpu_7b
          elif [[ "$RUNNER_VCPUS" -lt 4 ]] && [[ "$MODEL_SIZE" == "3b" ]]; then
              start_server_2vcpu_3b
          elif [[ "$RUNNER_VCPUS" -lt 4 ]] && [[ "$MODEL_SIZE" == "7b" ]]; then
              start_server_2vcpu_7b
          else
              start_server_2vcpu_3b
          fi
          echo "::endgroup::"
          
          {
              echo "LLAMA_SERVER_URL=http://127.0.0.1:8080"
              echo "GHOST_REVIEW_MODEL=qwen2.5-coder-${MODEL_SIZE}-instruct-q4_k_m"
          } >> "$GITHUB_ENV"

      - name: Run auto-fix
        if: steps.perms.outputs.allowed == 'true'
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER:  ${{ github.event.issue.number }}
          REPO:          ${{ github.repository }}
          ACTOR:         ${{ github.actor }}
        run: python .github/scripts/auto_fix.py

      - name: Stop inference server
        if: always() && steps.perms.outputs.allowed == 'true'
        run: |
          source .github/scripts/lib/server.sh
          stop_server
