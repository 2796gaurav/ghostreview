name: Ghost Review — PR Analysis

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to re-review (leave blank for current)"
        required: false
        type: string

# Prevent concurrent reviews on the same PR; cancel in-progress if new commit arrives.
concurrency:
  group: ghost-review-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-24.04-arm

    if: |
      github.event.pull_request.draft == false ||
      github.event_name == 'workflow_dispatch'

    permissions:
      pull-requests: write
      contents: read

    timeout-minutes: 30

    env:
      MODEL_SIZE_OVERRIDE: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Install build dependencies ─────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake git

      # ── Cache: Python packages ─────────────────────────────────────
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ghost-review-pip-${{ hashFiles('.github/scripts/requirements.txt') }}
          restore-keys: ghost-review-pip-

      # ── Install Python dependencies ────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -q -r .github/scripts/requirements.txt \
            --break-system-packages

      # ── Detect runner config FIRST (sets MODEL_SIZE) ───────────────
      - name: Detect runner configuration
        id: detect
        run: |
          source .github/scripts/lib/detect.sh
          detect_runner_config
          echo "model_size=${MODEL_SIZE}" >> "$GITHUB_OUTPUT"

      # ── Cache: llama.cpp binary (conditional on detect) ────────────
      - name: Cache llama.cpp binary
        uses: actions/cache@v4
        id: llama-cache
        with:
          path: ~/.cache/ghost-review/llama-bin
          key: ghost-review-llama-b8252-ubuntu-arm64-v2

      # ── Build llama.cpp if not cached ──────────────────────────────
      - name: Build llama.cpp
        if: steps.llama-cache.outputs.cache-hit != 'true'
        run: |
          source .github/scripts/lib/build.sh
          build_llama_cpp_if_needed

      # ── Cache: GGUF model file (only the one we'll use) ────────────
      - name: Cache LLM model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: ~/.cache/ghost-review/models
          key: ghost-review-model-${{ steps.detect.outputs.model_size }}-q4km-v1

      # ── Download model if not cached ───────────────────────────────
      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          source .github/scripts/lib/download.sh
          download_models_if_needed

      # ── Start llama-server ─────────────────────────────────────────
      - name: Start inference server
        run: |
          source .github/scripts/lib/server.sh
          source .github/scripts/lib/detect.sh
          detect_runner_config
          
          echo "::group::Start llama-server"
          if [[ "$RUNNER_VCPUS" -ge 4 ]] && [[ "$MODEL_SIZE" == "7b" ]]; then
              start_server_4vcpu_7b
          elif [[ "$RUNNER_VCPUS" -lt 4 ]] && [[ "$MODEL_SIZE" == "3b" ]]; then
              start_server_2vcpu_3b
          elif [[ "$RUNNER_VCPUS" -lt 4 ]] && [[ "$MODEL_SIZE" == "7b" ]]; then
              start_server_2vcpu_7b
          else
              start_server_2vcpu_3b
          fi
          echo "::endgroup::"
          
          # Export for later steps
          {
              echo "LLAMA_SERVER_URL=http://127.0.0.1:8080"
              echo "GHOST_REVIEW_MODEL=qwen2.5-coder-${MODEL_SIZE}-instruct-q4_k_m"
          } >> "$GITHUB_ENV"

      # ── Run the 4-pass PR review ───────────────────────────────────
      - name: Run PR review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:    ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO:         ${{ github.repository }}
          BASE_SHA:     ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:     ${{ github.event.pull_request.head.sha }}
        run: python .github/scripts/review.py

      # ── Cleanup: stop llama-server gracefully ─────────────────────
      - name: Stop inference server
        if: always()
        run: |
          source .github/scripts/lib/server.sh
          stop_server
