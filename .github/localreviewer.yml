# Ghost Review Configuration

model:
  size: auto  # auto, 7b, or 3b

review:
  passes:
    - summary
    - bugs
    - security
  
  # Paths to ignore in diff review
  ignore_paths:
    - "*.lock"
    - "*.min.js"
    - "*.min.css"
    - "dist/**"
    - "build/**"
    - ".next/**"
    - "test_app/**"  # Don't ignore in this test
  
  # Security-critical paths get priority in review
  security_critical_paths:
    - "**/auth/**"
    - "**/security/**"
    - "**/crypto/**"
    - "**/password/**"
    - "**/login/**"
    - "**/*secret*"
    - "test_app/calculator.py"  # For testing
  
  # Minimum severity to report
  min_severity: warning
  
  # Always post comment even if no issues found
  always_comment: true

auto_fix:
  enabled: true
  trigger_label: "auto-fix"
  trigger_comment: "/fix"
  required_permission: write
  confidence_threshold: 0.70
  max_files: 5
  
  # Protected paths that auto-fix cannot modify
  protected_paths:
    - ".github/**"
    - "*.yml"
    - "*.yaml"
    - "Makefile"
    - "Dockerfile"
    - "*.tf"
    - "*.tfvars"

conventions:
  language: python
  framework: ""
  notes: |
    This is a test repository for Ghost Review.
    Code should follow PEP 8 style guidelines.
